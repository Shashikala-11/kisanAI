<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Kisan AI{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body { background: #f4f7f0; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #1a4731; }
    .navbar-brand, .nav-link { color: #fff !important; }
    .nav-link:hover { color: #a8d5b5 !important; }
    .nav-link.active { color: #a8d5b5 !important; font-weight: 600; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{% url 'home' %}">
        <i class="bi bi-truck fs-5"></i> Kisan AI
      </a>
      <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <i class="bi bi-list text-white fs-4"></i>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item">
            <a class="nav-link {% block nav_home %}{% endblock %}" href="{% url 'home' %}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% block nav_chat %}{% endblock %}" href="{% url 'chat' %}">
              <i class="bi bi-chat-dots"></i> Chat
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% block nav_pest %}{% endblock %}" href="{% url 'pest' %}">
              <i class="bi bi-bug"></i> Pest Detect
            </a>
          </li>
          <li class="nav-item">
            {% if request.session.farmer_id %}
            <a class="nav-link {% block nav_dash %}{% endblock %}" href="{% url 'farmer-dashboard' %}">
              <i class="bi bi-person-circle"></i> My Farm
            </a>
            {% else %}
            <a class="nav-link {% block nav_reg %}{% endblock %}" href="{% url 'farmer-register' %}">
              <i class="bi bi-box-arrow-in-right"></i> Login
            </a>
            {% endif %}
          </li>
          {% if request.session.farmer_id %}
          <li class="nav-item">
            <a class="nav-link" href="{% url 'farmer-logout' %}">
              <i class="bi bi-box-arrow-right"></i> Logout
            </a>
          </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
